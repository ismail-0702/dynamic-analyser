version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./analyzer:/app/analyzer
    environment:
      - UPLOAD_DIR=/app/uploads
      - PYTHONUNBUFFERED=1
    networks:
      - apk-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - apk-net
    restart: unless-stopped

networks:
  apk-net:
    driver: bridge

volumes:
  uploads: